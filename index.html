<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roboto Flex — Variable Type Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

/* ---- Roboto Flex, full axis range, direct from Google Fonts ---- */
@font-face {
  font-family: 'Roboto Flex';
  font-style: oblique 0deg 10deg;
  font-weight: 100 1000;
  font-stretch: 25% 151%;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/robotoflex/v30/NaPccZLOBv5T3oB7Cb4i0zu3RMHsCoRTXr0.woff2) format('woff2');
  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;
}
@font-face {
  font-family: 'Roboto Flex';
  font-style: oblique 0deg 10deg;
  font-weight: 100 1000;
  font-stretch: 25% 151%;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/robotoflex/v30/NaPccZLOBv5T3oB7Cb4i0zu-RMHsCoRTXr0.woff2) format('woff2');
  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
}
@font-face {
  font-family: 'Roboto Flex';
  font-style: oblique 0deg 10deg;
  font-weight: 100 1000;
  font-stretch: 25% 151%;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/robotoflex/v30/NaPccZLOBv5T3oB7Cb4i0zu5RMHsCoRTXr0.woff2) format('woff2');
  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;
}
@font-face {
  font-family: 'Roboto Flex';
  font-style: oblique 0deg 10deg;
  font-weight: 100 1000;
  font-stretch: 25% 151%;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/robotoflex/v30/NaPccZLOBv5T3oB7Cb4i0zu1RMHsCoRTXr0.woff2) format('woff2');
  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
}
@font-face {
  font-family: 'Roboto Flex';
  font-style: oblique 0deg 10deg;
  font-weight: 100 1000;
  font-stretch: 25% 151%;
  font-display: swap;
  src: url(https://fonts.gstatic.com/s/robotoflex/v30/NaPccZLOBv5T3oB7Cb4i0zu6RMHsCoRT.woff2) format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}

:root{
  --page-bg:#F0F0F0;
  --panel-bg:#FFFFFF;
  --card-bg:#FFFFFF;
  --border:#E5E7EB;
  --track:#E5E7EB;
  --accent:#111827;
  --accent-hover:#374151;
  --text-strong:#111827;
  --text-dim:#6B7280;
  --text-meta:#888888;
  --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; background:var(--page-bg); }
body{
  font-family: var(--font-ui);
  color: var(--text-strong);
  min-height:100vh;
}

.app{ display:flex; min-height:100vh; }

/* ---------------- Panel ---------------- */
.panel{
  width: 320px;
  flex-shrink:0;
  background: var(--panel-bg);
  padding: 24px;
  max-height:100vh;
  overflow-y:auto;
  position:sticky;
  top:0;
}
.panel::-webkit-scrollbar{ width:8px; }
.panel::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }

.brand{ margin-bottom:20px; }
.brand-title{
  font-family: var(--font-body);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--text-strong);
}
.brand-sub{
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 3px;
}

.field{ margin-bottom:16px; }
.field label, .section-label{
  display:block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin: 18px 0 8px;
}
.field:first-of-type label{ margin-top:0; }

#word-input{
  width:100%;
  background: var(--panel-bg);
  border: 1px solid var(--border);
  color: var(--text-strong);
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 14px;
  padding: 12px 16px;
  border-radius: 8px;
  outline:none;
}
#word-input:focus{ border-color: var(--accent); }

.slider-row{ margin-bottom: 13px; }
.row-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  font-size: 12px;
  color: var(--text-strong);
  margin-bottom: 6px;
}
.row-head .tag{
  color: var(--text-dim);
  font-size: 10px;
  font-weight: 400;
  margin-left: 4px;
}
.row-head .val{ color: var(--text-strong); font-weight:600; }

input[type=range]{
  -webkit-appearance:none;
  width:100%;
  height: 4px;
  background: var(--track);
  border-radius: 2px;
  outline:none;
  margin: 4px 0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:12px; height:12px;
  border-radius:50%;
  background: var(--accent);
  cursor:pointer;
  border: none;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 1px 2px rgba(0,0,0,0.3);
}
input[type=range]::-moz-range-thumb{
  width:12px; height:12px;
  border-radius:50%;
  background: var(--accent);
  cursor:pointer;
  border: none;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 1px 2px rgba(0,0,0,0.3);
}

.presets{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.chip{
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 11px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--panel-bg);
  color: var(--text-strong);
  border-radius: 6px;
  cursor:pointer;
}
.chip:hover{ border-color: var(--accent); }

.advanced-toggle{
  width:100%;
  display:flex; justify-content:space-between; align-items:center;
  background:none; border:none;
  color: var(--text-dim);
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 12px 2px;
  margin-top: 6px;
  cursor:pointer;
}
.advanced-toggle:hover{ color: var(--text-strong); }
.advanced-toggle .chev{ transition: transform 150ms ease; color: var(--text-strong); }
.advanced-toggle.open .chev{ transform: rotate(90deg); }

.para-axes{
  max-height:0;
  overflow:hidden;
  transition: max-height 180ms ease;
}
.para-axes.open{ max-height: 900px; padding-top: 14px; }

.actions{ display:flex; gap:8px; margin: 12px 0 6px; }
.btn{
  flex:1;
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 12px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  background: var(--panel-bg);
  color: var(--text-strong);
  border-radius: 6px;
  cursor:pointer;
}
.btn:hover{ border-color: var(--accent); background: #F9FAFB; }
.btn:disabled{ opacity:0.4; cursor:not-allowed; }
.btn:disabled:hover{ border-color: var(--border); background: var(--panel-bg); }
.btn.captured{ border-color: var(--accent); background: #F3F4F6; }

.motion-status{
  font-size: 11px;
  color: var(--text-dim);
  margin: 8px 0 4px;
}

.code-out{
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  font-size: 12px;
  line-height: 1.4;
  color: var(--text-dim);
  white-space: pre-wrap;
  word-break: break-all;
  margin: 0 0 8px;
}
.btn-copy{ width:100%; }

.credit{
  margin-top: 20px;
  font-size: 10px;
  line-height:1.6;
  color: var(--text-dim);
}
.credit a{ color: var(--text-strong); text-decoration:none; }
.credit a:hover{ text-decoration:underline; }

/* ---------------- Stage ---------------- */
.stage{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 48px 40px;
}
.specimen-card{
  background: var(--card-bg);
  color: var(--text-strong);
  width:100%;
  max-width: 640px;
  aspect-ratio: 1 / 1;
  padding: 32px 48px;
  border-radius: 8px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
  position:relative;
  display:flex;
  flex-direction:column;
}
.specimen-card::before{
  content:"";
  position:absolute; top:32px; left:48px; right:48px;
  height:1px;
  background: rgba(17,24,39,0.08);
}
.specimen-word{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family: 'Roboto Flex', sans-serif;
  font-optical-sizing: none;
  line-height: 1.05;
  letter-spacing: -0.02em;
  text-align: center;
  word-break: break-word;
  overflow-wrap: anywhere;
  min-height: 1em;
  transition: font-variation-settings 90ms linear;
}
.specimen-caption{
  margin-top: 22px;
  padding-top: 14px;
  border-top: 1px solid rgba(17,24,39,0.08);
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0;
  color: var(--text-meta);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap: 6px 14px;
}

@media (max-width: 860px){
  .app{ flex-direction:column; }
  .panel{ width:100%; max-height:none; position:relative; }
  .stage{ padding: 28px 18px; }
  .specimen-card{ padding: 28px 22px; }
}
</style>
</head>
<body>

<div class="app">
  <aside class="panel">
    <div class="brand">
      <div class="brand-title">Roboto Flex</div>
      <div class="brand-sub">Variable Type Lab</div>
    </div>

    <div class="field">
      <label for="word-input">Text</label>
      <input id="word-input" type="text" value="Flexible" maxlength="60" autocomplete="off" spellcheck="false">
    </div>

    <div class="slider-row">
      <div class="row-head"><span>Preview size</span><span class="val" id="val-size">120</span></div>
      <input type="range" id="range-size" min="24" max="180" step="1" value="120">
    </div>

    <div class="section-label">Registered axes</div>
    <div id="core-axes"></div>

    <div class="section-label">Presets</div>
    <div class="presets" id="presets"></div>

    <div class="section-label">Motion</div>
    <div class="actions">
      <button class="btn" id="capture-a-btn">Set A</button>
      <button class="btn" id="capture-b-btn">Set B</button>
    </div>
    <div class="slider-row">
      <div class="row-head"><span>Speed<span class="tag">sec / cycle</span></span><span class="val" id="val-speed">2</span></div>
      <input type="range" id="range-speed" min="0.3" max="6" step="0.1" value="2">
    </div>
    <button class="btn btn-copy" id="play-btn" disabled>▶ Play</button>
    <div class="motion-status" id="motion-status">Set A and B to enable playback</div>

    <button class="advanced-toggle" id="advanced-toggle">Parametric axes (8) <span class="chev">▸</span></button>
    <div class="para-axes" id="para-axes">
      <div id="para-axes-inner"></div>
    </div>

    <div class="actions">
      <button class="btn" id="reset-btn">Reset</button>
      <button class="btn" id="random-btn">Randomize</button>
    </div>

    <div class="section-label">CSS</div>
    <pre class="code-out" id="code-out"></pre>
    <button class="btn btn-copy" id="copy-btn">Copy CSS</button>

    <div class="credit">
      Roboto Flex, designed by Google Fonts &amp; Font Bureau · SIL Open Font License ·
      <a href="https://fonts.google.com/specimen/Roboto+Flex" target="_blank" rel="noopener">View on Google Fonts</a>
    </div>
  </aside>

  <main class="stage">
    <div class="specimen-card">
      <div class="specimen-word" id="specimen-word">Flexible</div>
      <div class="specimen-caption" id="specimen-caption"></div>
    </div>
  </main>
</div>

<script>
const AXES = [
  { tag:'wght', label:'Weight',        group:'core', min:100,  max:1000, step:1,   def:400  },
  { tag:'wdth', label:'Width',         group:'core', min:25,   max:151,  step:1,   def:100  },
  { tag:'opsz', label:'Optical size',  group:'core', min:8,    max:144,  step:0.5, def:14   },
  { tag:'slnt', label:'Slant',         group:'core', min:-10,  max:0,    step:1,   def:0    },
  { tag:'GRAD', label:'Grade',         group:'core', min:-200, max:150,  step:1,   def:0    },
  { tag:'XOPQ', label:'Thin stroke',      group:'para', min:27,   max:175, step:1, def:96  },
  { tag:'XTRA', label:'Counter width',    group:'para', min:323,  max:603, step:1, def:468 },
  { tag:'YOPQ', label:'Thick stroke',     group:'para', min:25,   max:135, step:1, def:79  },
  { tag:'YTAS', label:'Ascender height',  group:'para', min:649,  max:854, step:1, def:750 },
  { tag:'YTDE', label:'Descender depth',  group:'para', min:-305, max:-98, step:1, def:-203},
  { tag:'YTFI', label:'Figure height',    group:'para', min:560,  max:788, step:1, def:738 },
  { tag:'YTLC', label:'Lowercase height', group:'para', min:416,  max:570, step:1, def:514 },
  { tag:'YTUC', label:'Uppercase height', group:'para', min:528,  max:760, step:1, def:712 },
];

const PRESETS = [
  { name:'Reset',          v:{} },
  { name:'Thin',           v:{ wght:150, wdth:120, opsz:96, GRAD:-80 } },
  { name:'Black',          v:{ wght:1000, wdth:80, opsz:60, GRAD:100 } },
  { name:'Condensed Bold', v:{ wght:800, wdth:30, opsz:24 } },
  { name:'Expanded Light', v:{ wght:250, wdth:151, opsz:40 } },
  { name:'Caption',        v:{ wght:500, wdth:100, opsz:8 } },
  { name:'Poster',         v:{ wght:900, wdth:140, opsz:144 } },
  { name:'Oblique',        v:{ wght:300, slnt:-10 } },
];

const WEIGHT_NAMES = [
  [100,'Thin'],[200,'ExtraLight'],[300,'Light'],[400,'Regular'],[500,'Medium'],
  [600,'SemiBold'],[700,'Bold'],[800,'ExtraBold'],[900,'Black'],[1000,'ExtraBlack']
];

let state = {};
AXES.forEach(a => state[a.tag] = a.def);
let size = 120;

const wordInput   = document.getElementById('word-input');
const sizeRange   = document.getElementById('range-size');
const sizeVal     = document.getElementById('val-size');
const coreWrap    = document.getElementById('core-axes');
const paraWrap    = document.getElementById('para-axes-inner');
const presetsWrap = document.getElementById('presets');
const advToggle   = document.getElementById('advanced-toggle');
const advPanel    = document.getElementById('para-axes');
const specimen    = document.getElementById('specimen-word');
const caption     = document.getElementById('specimen-caption');
const codeOut     = document.getElementById('code-out');
const copyBtn     = document.getElementById('copy-btn');
const captureABtn = document.getElementById('capture-a-btn');
const captureBBtn = document.getElementById('capture-b-btn');
const speedRange  = document.getElementById('range-speed');
const speedVal    = document.getElementById('val-speed');
const playBtn     = document.getElementById('play-btn');
const motionStatus = document.getElementById('motion-status');

let capturedA = null;
let capturedB = null;
let playing = false;
let animRafId = null;
let animStart = null;

function renderAxisRow(axis){
  const row = document.createElement('div');
  row.className = 'slider-row';
  row.innerHTML =
    '<div class="row-head"><span>' + axis.label + '<span class="tag">' + axis.tag + '</span></span>' +
    '<span class="val" id="val-' + axis.tag + '">' + axis.def + '</span></div>' +
    '<input type="range" id="range-' + axis.tag + '" min="' + axis.min + '" max="' + axis.max +
    '" step="' + axis.step + '" value="' + axis.def + '">';
  return row;
}

AXES.forEach(a => {
  const row = renderAxisRow(a);
  (a.group === 'core' ? coreWrap : paraWrap).appendChild(row);
});

AXES.forEach(a => {
  const input = document.getElementById('range-' + a.tag);
  updateSliderFill(input);
  input.addEventListener('input', () => {
    stopAnimation();
    state[a.tag] = parseFloat(input.value);
    document.getElementById('val-' + a.tag).textContent = formatNum(state[a.tag]);
    updateSliderFill(input);
    render();
  });
});
updateSliderFill(sizeRange);

PRESETS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = p.name;
  btn.addEventListener('click', () => applyPreset(p.v));
  presetsWrap.appendChild(btn);
});

function formatNum(n){
  return (Math.round(n * 10) / 10).toString();
}

function updateSliderFill(input){
  const min = parseFloat(input.min), max = parseFloat(input.max);
  const pct = ((parseFloat(input.value) - min) / (max - min)) * 100;
  input.style.background = 'linear-gradient(to right, var(--accent) ' + pct + '%, var(--track) ' + pct + '%)';
}

function applyPreset(overrides){
  stopAnimation();
  AXES.forEach(a => {
    state[a.tag] = (a.tag in overrides) ? overrides[a.tag] : a.def;
    const input = document.getElementById('range-' + a.tag);
    input.value = state[a.tag];
    document.getElementById('val-' + a.tag).textContent = formatNum(state[a.tag]);
    updateSliderFill(input);
  });
  render();
}

function randomize(){
  stopAnimation();
  AXES.forEach(a => {
    const v = a.min + Math.random() * (a.max - a.min);
    const stepped = Math.round(v / a.step) * a.step;
    state[a.tag] = Math.min(a.max, Math.max(a.min, stepped));
    const input = document.getElementById('range-' + a.tag);
    input.value = state[a.tag];
    document.getElementById('val-' + a.tag).textContent = formatNum(state[a.tag]);
    updateSliderFill(input);
  });
  render();
}

function nearestWeightName(w){
  let best = WEIGHT_NAMES[0];
  WEIGHT_NAMES.forEach(pair => {
    if (Math.abs(w - pair[0]) < Math.abs(w - best[0])) best = pair;
  });
  return best[1];
}

function buildFVS(){
  return AXES.map(a => "'" + a.tag + "' " + formatNum(state[a.tag])).join(', ');
}

function render(){
  const fvs = buildFVS();
  specimen.style.fontVariationSettings = fvs;
  specimen.style.fontSize = size + 'px';
  specimen.textContent = wordInput.value || ' ';

  caption.innerHTML =
    '<span>' + size + 'px · ' + nearestWeightName(state.wght) + ' ' + formatNum(state.wght) + '</span>' +
    '<span>' + formatNum(state.wdth) + '% width</span>' +
    '<span>opsz ' + formatNum(state.opsz) + '</span>' +
    '<span>grade ' + formatNum(state.GRAD) + '</span>';

  codeOut.textContent =
    "font-family: 'Roboto Flex';\n" +
    "font-optical-sizing: none;\n" +
    "font-variation-settings:\n  " + fvs.split(', ').join(',\n  ') + ";\n" +
    "font-size: " + size + "px;";
}

wordInput.addEventListener('input', render);

sizeRange.addEventListener('input', () => {
  size = parseFloat(sizeRange.value);
  sizeVal.textContent = size;
  updateSliderFill(sizeRange);
  render();
});

advToggle.addEventListener('click', () => {
  advPanel.classList.toggle('open');
  advToggle.classList.toggle('open');
});

document.getElementById('reset-btn').addEventListener('click', () => {
  stopAnimation();
  applyPreset({});
  size = 120;
  sizeRange.value = 120;
  sizeVal.textContent = 120;
  updateSliderFill(sizeRange);
  wordInput.value = 'Flexible';
  render();
});

document.getElementById('random-btn').addEventListener('click', randomize);

/* ---------------- Motion: A/B morph loop ---------------- */
function captureSnapshot(){
  const snap = {};
  AXES.forEach(a => snap[a.tag] = state[a.tag]);
  return snap;
}

function updateMotionUI(){
  captureABtn.classList.toggle('captured', !!capturedA);
  captureBBtn.classList.toggle('captured', !!capturedB);
  captureABtn.textContent = capturedA ? 'Set A ✓' : 'Set A';
  captureBBtn.textContent = capturedB ? 'Set B ✓' : 'Set B';
  playBtn.disabled = !(capturedA && capturedB);
  motionStatus.textContent = playing
    ? 'Morphing between A and B on loop'
    : (capturedA && capturedB ? 'Ready — press Play to morph between A and B' : 'Set A and B to enable playback');
}

captureABtn.addEventListener('click', () => {
  stopAnimation();
  capturedA = captureSnapshot();
  updateMotionUI();
});

captureBBtn.addEventListener('click', () => {
  stopAnimation();
  capturedB = captureSnapshot();
  updateMotionUI();
});

speedRange.addEventListener('input', () => {
  speedVal.textContent = speedRange.value;
});

function applyAxisValues(values){
  AXES.forEach(a => {
    state[a.tag] = values[a.tag];
    const input = document.getElementById('range-' + a.tag);
    input.value = state[a.tag];
    document.getElementById('val-' + a.tag).textContent = formatNum(state[a.tag]);
    updateSliderFill(input);
  });
  render();
}

function animTick(timestamp){
  if (!animStart) animStart = timestamp;
  const elapsed = (timestamp - animStart) / 1000;
  const halfCycle = parseFloat(speedRange.value);
  const phase = (1 - Math.cos((elapsed / halfCycle) * Math.PI)) / 2;
  const values = {};
  AXES.forEach(a => {
    values[a.tag] = capturedA[a.tag] + (capturedB[a.tag] - capturedA[a.tag]) * phase;
  });
  applyAxisValues(values);
  if (playing) animRafId = requestAnimationFrame(animTick);
}

function stopAnimation(){
  if (!playing) return;
  playing = false;
  if (animRafId) cancelAnimationFrame(animRafId);
  animRafId = null;
  playBtn.textContent = '▶ Play';
  updateMotionUI();
}

playBtn.addEventListener('click', () => {
  if (playing) {
    stopAnimation();
  } else {
    if (!capturedA || !capturedB) return;
    playing = true;
    animStart = null;
    playBtn.textContent = '⏸ Pause';
    updateMotionUI();
    animRafId = requestAnimationFrame(animTick);
  }
});

copyBtn.addEventListener('click', () => {
  const text = codeOut.textContent;
  const done = () => {
    const original = copyBtn.textContent;
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = original; }, 1200);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(done);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    done();
  }
});

render();
</script>
</body>
</html>
